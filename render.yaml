services:
  # 1. Main Unified Web Service (Backend + Frontend)
  - type: web
    name: gigshield-unified
    env: node
    plan: free
    buildCommand: npm install && npm run build && cd backend && npm install
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: MONGO_URI
        fromValue: ${MONGO_URI} # User will provide this in Render dashboard
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 4001
      - key: AI_SERVICE_URL
        fromService:
          type: web
          name: gigshield-ai
          property: host

  # 2. AI Microservice (Python)
  - type: web
    name: gigshield-ai
    env: python
    plan: free
    buildCommand: cd ai-service && pip install -r requirements.txt
    startCommand: cd ai-service && gunicorn app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.12
